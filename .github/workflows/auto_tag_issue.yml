name: Auto-tag issue to project and assign to self

on:
  issues:
    types: [opened]

jobs:
  assign-and-add-to-project:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      # Step 1: Auto-assign the issue to yourself
      - name: Assign issue to myself
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: ['gopikrishee']
            });

      # Step 2: Add issue to your GitHub Project (Projects v2)
      - name: Add issue to project
        uses: actions/add-to-project@v0.6.1
        with:
          project-url: https://github.com/users/gopikrishee/projects/1
          github-token: ${{ secrets.PROJECT_TOKEN }}